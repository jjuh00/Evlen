{% extends "base.html" %}

{% block title %}Evlen - Upcoming events{% endblock %}

{% block content %}
<section class="page-section">
    <h1 id="page-title">Upcoming Events</h1>
    <p id="page-subtitle">Browse and join upcoming events in your community.</p>
</section>

<!--Search and filter bar: hx-get="/events" triggers a fresh event listing request with filters applied -->
<div class="filter-bar">
    <div class="search-wrap">
        <input 
            id="search-input"
            type="search"
            name="search"
            placeholder="Search events"
            hx-get="/events"
            hx-trigger="input changed delay:300ms, search"
            hx-target="#event-list"
            hx-swap="innerHTML"
            hx-include="#tag-filter [data-active='true']"
        >
    </div>

    <!--Tag filter buttons are loaded separately so the list is always fresh-->
    <div
        id="tag-filter"
        hx-get="/events/tags"
        hx-trigger="load"
        hx-swap="innerHTML"
    >
        <!--Tags are loaded here by HTMX-->
    </div>
</div>

<!--Event listing: Loaded via HTMX. The shell is visible at once; cards are populated
as the /events fragment arrives-->
<div
    id="event-list"
    class="event-grid"
    hx-get="/events"
    hx-trigger="load"
    hx-swap="innerHTML"
    hx-vals='js:{tag: new URLSearchParams(location.search).get("tag") || ""}'>

    <!--Skeleton placeholders shows while events are loading-->
    <div class="event-card skeleton" aria-hidden="true"></div>
    <div class="event-card skeleton" aria-hidden="true"></div>
    <div class="event-card skeleton" aria-hidden="true"></div>
    <div class="event-card skeleton" aria-hidden="true"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="/static/scripts/events.js" defer></script>
<script>
    "use strict";

    /**
     * After tag buttons are loaded, check if there's a tag query parameter in the URL. 
     * If so, activate the corresponding tag button and trigger a new event listing request with the tag filter applied.
     */
    document.addEventListener("htmx:afterSwap", function onTagsLoaded(e) {
        if (e.target.id !== "tag-filter") return;

        const params = new URLSearchParams(location.search);
        const initialTag = params.get("tag");
        if (!initialTag) return;

        const tagButton = e.target.querySelector(`.tag-button[data-tag="${CSS.escape(initialTag)}"]`);
        if (!tagButton) return;

        // Activate the tag button
        setTagFilter(tagButton);

        // Re-trigger the event-list with tag filter applied
        htmx.ajax("GET", `/events?tag=${encodeURIComponent(initialTag)}`, {
            target: "#event-list",
            swap: "innerHTML"
        });
    });
</script>
{% endblock %}
