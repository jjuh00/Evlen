services:
  app:
    build: ./backend
    container_name: evlen_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
    environment:
      APP_ENV: production
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: evlen
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:8
    container_name: evlen_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo_data: